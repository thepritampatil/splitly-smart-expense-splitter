# =============================================
# Splitly Application Configuration
# =============================================

# Server
server.port=8080

# Active Profile (dev uses H2, prod uses PostgreSQL)
spring.profiles.active=${SPRING_PROFILE:dev}

# =============================================
# H2 In-Memory Database (Development)
# =============================================
spring.datasource.url=jdbc:h2:mem:splitlydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT Configuration
# =============================================
jwt.secret=${JWT_SECRET:splitly_super_secret_key_for_jwt_authentication_2024_production}
jwt.expiration=86400000

# =============================================
# CORS Configuration
# =============================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# =============================================
# Logging
# =============================================
logging.level.com.splitly=INFO
logging.level.org.springframework.security=WARN
